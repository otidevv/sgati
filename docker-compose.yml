version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sgati_db
    restart: always
    environment:
      POSTGRES_DB: sgati
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
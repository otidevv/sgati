# Configuración Apache para exponer SGATI por IP:Puerto
# Ejemplo: http://192.168.1.100:8080

# 1. Agregar el puerto en httpd.conf
Listen 8080

# 2. Virtual Host para IP específica
<VirtualHost 192.168.1.100:8080>
    DocumentRoot "C:/Apache24/htdocs/sgati/public"
    ServerName 192.168.1.100
    
    <Directory "C:/Apache24/htdocs/sgati/public">
        AllowOverride All
        Require all granted
        Options -Indexes
        
        # Habilitar mod_rewrite para Laravel
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [L]
    </Directory>
    
    # Logs específicos
    ErrorLog "logs/sgati_error.log"
    CustomLog "logs/sgati_access.log" common
</VirtualHost>

# 3. Para cualquier IP en el puerto 8080
<VirtualHost *:8080>
    DocumentRoot "C:/Apache24/htdocs/sgati/public"
    
    <Directory "C:/Apache24/htdocs/sgati/public">
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>
    
    ErrorLog "logs/sgati_error.log"
    CustomLog "logs/sgati_access.log" common
</VirtualHost>
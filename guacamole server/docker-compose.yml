services:

  # ── Guacamole Daemon (guacd) ─────────────────────────────────────────
  # Maneja los protocolos de acceso remoto: RDP, SSH, VNC, Telnet
  guacd:
    image: guacamole/guacd:1.5.5
    container_name: sgati_guacd
    restart: unless-stopped
    volumes:
      - ./data/drive:/drive:rw          # transferencia de archivos
      - ./data/record:/record:rw        # grabaciones de sesiones
    networks:
      - guacamole_net

  # ── Base de datos PostgreSQL (exclusiva para Guacamole) ──────────────
  guacamole_db:
    image: postgres:16-alpine
    container_name: sgati_guacamole_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${GUAC_DB:-guacamole_db}
      POSTGRES_USER:     ${GUAC_DB_USER:-guacamole}
      POSTGRES_PASSWORD: ${GUAC_DB_PASSWORD:?Variable GUAC_DB_PASSWORD requerida en .env}
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro   # SQL de inicialización (generado por setup.ps1)
      - guacamole_db_data:/var/lib/postgresql/data
    networks:
      - guacamole_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GUAC_DB_USER:-guacamole} -d ${GUAC_DB:-guacamole_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Guacamole Web App (Tomcat) ───────────────────────────────────────
  guacamole:
    image: guacamole/guacamole:1.5.5
    container_name: sgati_guacamole
    restart: unless-stopped
    depends_on:
      guacamole_db:
        condition: service_healthy
      guacd:
        condition: service_started
    environment:
      # Conexión con guacd
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822

      # Base de datos
      POSTGRESQL_HOSTNAME: guacamole_db
      POSTGRESQL_PORT:     5432
      POSTGRESQL_DATABASE: ${GUAC_DB:-guacamole_db}
      POSTGRESQL_USER:     ${GUAC_DB_USER:-guacamole}
      POSTGRESQL_PASSWORD: ${GUAC_DB_PASSWORD:?Variable GUAC_DB_PASSWORD requerida en .env}

      # Seguridad: previene que usuarios sin conexiones accedan
      POSTGRESQL_AUTO_CREATE_ACCOUNTS: "false"

      # Directorio home de Guacamole (extensiones, propiedades extra)
      GUACAMOLE_HOME: /guacamole-home

      # Tiempo máximo de sesión inactiva (segundos): 2 horas
      API_SESSION_TIMEOUT: "7200"
    volumes:
      - ./guacamole-home:/guacamole-home:ro
    networks:
      - guacamole_net
    # Solo exponer directamente si NO se usa nginx
    # ports:
    #   - "${GUAC_PORT:-8080}:8080"

  # ── Nginx (reverse proxy + SSL termination) ──────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sgati_guacamole_nginx
    restart: unless-stopped
    depends_on:
      - guacamole
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - guacamole_net

volumes:
  guacamole_db_data:
    name: sgati_guacamole_db_data

networks:
  guacamole_net:
    name: sgati_guacamole_net
    driver: bridge

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Ajustes para WebSocket (esencial en Guacamole) ────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream: Guacamole Tomcat ────────────────────────────────────
    upstream guacamole_backend {
        server guacamole:8080;
        keepalive 32;
    }

    # ── HTTP → redirige a HTTPS (cuando hay certificado) ──────────────
    server {
        listen 80;
        server_name _;

        # Si tienes SSL activo, descomenta esta redirección:
        # return 301 https://$host$request_uri;

        # Sin SSL: redirige / a /guacamole/
        location = / {
            return 301 /guacamole/;
        }

        location /guacamole/ {
            proxy_pass         http://guacamole_backend/guacamole/;
            proxy_buffering    off;
            proxy_http_version 1.1;

            # Headers estándar de proxy
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Headers WebSocket (imprescindible para el túnel de Guacamole)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Timeouts largos para sesiones RDP/SSH activas
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
            proxy_connect_timeout 10s;

            # Tamaño máximo de body (para transferencia de archivos)
            client_max_body_size 100m;

            access_log off;
        }
    }

    # ── HTTPS (activar cuando tengas certificados en nginx/certs/) ─────
    # Para SSL auto-firmado (desarrollo): ejecuta setup.ps1 -GenerateCert
    # Para producción: coloca fullchain.pem y privkey.pem en nginx/certs/
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     location = / {
    #         return 301 /guacamole/;
    #     }
    #
    #     location /guacamole/ {
    #         proxy_pass         http://guacamole_backend/guacamole/;
    #         proxy_buffering    off;

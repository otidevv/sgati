# ──────────────────────────────────────────────────────────────────────
#  Guacamole — Propiedades adicionales
#  (La mayoría de la config se pasa vía variables de entorno en compose)
# ──────────────────────────────────────────────────────────────────────

# Tiempo de expiración de sesión API (segundos): 2 horas
api-session-timeout: 7200

# Permitir que el servidor confíe en cabeceras X-Forwarded-For de nginx
# (solo cuando nginx está en la misma red Docker)
# trusted-proxies: 172.0.0.0/8

# Extensiones habilitadas (dejar vacío usa las del classpath por defecto)
# enable-environment-properties: true
